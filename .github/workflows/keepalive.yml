name: 24-7

on:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Write file
        run: echo $(date) >> alive.txt

      - name: Commit changes
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add .
          git commit -m "24/7 run" || echo "no changes"
          git push