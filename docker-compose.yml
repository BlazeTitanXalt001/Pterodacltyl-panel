version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64g

  odoo:
    image: odoo:17
    environment:
      HOST: postgres
      USER: odoo
      PASSWORD: odoo_password
      DB_PORT: 5432
    volumes:
      - odoo_data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
    ports:
      - "8069:8069"
      - "8072:8072"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: odoo -d odoo -i base --db_user=odoo --db_password=odoo_password --db_host=postgres
    deploy:
      resources:
        limits:
          memory: 64g

volumes:
  postgres_data:
  odoo_data:
